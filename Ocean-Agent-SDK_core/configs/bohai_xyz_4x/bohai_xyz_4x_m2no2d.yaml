model:
  name: M2NO2d
  num_layer: 5
  in_channels: 3
  out_channels: 3
  k: 8
  c: 2
  grid_levels:
  - 1
  - 1
  - 2
  - 2
  - 2
  - 3
  padding_mode: circular
  bias: true
  base: legendre
  norm: true
  activation: gelu
  resolutions:
  - 64
  - 64
data:
  name: OceanNPY
  data_path: /ai/gno/DATA/ns/ns_V1e-5_N1200_T20.mat
  sample_factor: 4
  shape:
  - 200
  - 148
  train_batchsize: 2
  eval_batchsize: 2
  train_ratio: 0.98
  valid_ratio: 0.01
  test_ratio: 0.01
  subset: false
  subset_ratio: 0.1
  normalize: true
  normalizer_type: PGN
  dataset_root: /data/Bohai_Sea/process_data
  dyn_vars:
  - Vx
  - Vy
  - Vz
  patch_size: 64
  auto_patch: true
  model_divisor: 1
train:
  random_seed: 42
  cuda: true
  device: 0
  epochs: 500
  patience: 10
  eval_freq: 50
  saving_best: true
  load_ckpt: false
  saving_ckpt: false
  ckpt_freq: 100
  ckpt_max: 3
  distribute: false
  distribute_mode: DDP
  device_ids:
  - 0
  seed: 42
  use_amp: false
  gradient_checkpointing: true
  ckpt_path: ''
optimize:
  optimizer: AdamW
  lr: 0.001
  weight_decay: 0.001
schedule:
  scheduler: StepLR
  step_size: 300
  gamma: 0.5
log:
  verbose: true
  log: true
  log_dir: /data/Bohai_Sea/process_data/training_outputs/m2no2d_xyz_4x
  wandb: false
  wandb_project: OceanSR-M2NO2d

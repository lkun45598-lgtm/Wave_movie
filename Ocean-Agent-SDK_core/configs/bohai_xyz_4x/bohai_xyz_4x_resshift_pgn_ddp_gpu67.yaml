model:
  name: Resshift
  in_channels: 3
  out_channels: 3
  channel_mults:
  - 1
  - 2
  - 2
  - 4
resshift:
  model:
    target: models.resshift.models.unet.UNetModelSwin
    ckpt_path: null
    params:
      image_size: 64
      in_channels: 3
      model_channels: 160
      out_channels: 3
      attention_resolutions:
      - 64
      - 32
      - 16
      - 8
      dropout: 0
      channel_mult:
      - 1
      - 2
      - 2
      - 4
      num_res_blocks:
      - 2
      - 2
      - 2
      - 2
      conv_resample: true
      dims: 2
      use_fp16: false
      num_head_channels: 32
      use_scale_shift_norm: true
      resblock_updown: false
      swin_depth: 2
      swin_embed_dim: 192
      window_size: 8
      mlp_ratio: 4
      cond_lq: true
      lq_size: 64
      cond_mask: false
  diffusion:
    target: models.resshift.models.script_util.create_gaussian_diffusion
    params:
      sf: 4
      schedule_name: exponential
      schedule_kwargs:
        power: 0.3
      etas_end: 0.99
      steps: 15
      min_noise_level: 0.04
      kappa: 2.0
      weighted_mse: false
      predict_type: xstart
      timestep_respacing: null
      scale_factor: 1.0
      normalize_input: false
      latent_flag: false
data:
  name: OceanNPY
  data_path: /home/yc/CVPR26/DiffSR/NavierStokes_V1e-5_N1200_T20.mat
  sample_factor: 4
  shape:
  - 200
  - 148
  train_batchsize: 8
  eval_batchsize: 8
  train_ratio: 0.98
  valid_ratio: 0.01
  test_ratio: 0.01
  subset: false
  subset_ratio: 0.1
  normalize: true
  normalizer_type: PGN
  dataset_root: /data/Bohai_Sea/process_data
  dyn_vars:
  - Vx
  - Vy
  - Vz
  patch_size: 64
  auto_patch: true
  model_divisor: 64
train:
  random_seed: 42
  cuda: true
  device: 0
  epochs: 500
  patience: 10
  eval_freq: 50
  saving_best: true
  load_ckpt: false
  ckpt_path: ''
  saving_ckpt: true
  ckpt_freq: 50
  ckpt_max: 3
  distribute: true
  distribute_mode: DDP
  device_ids:
  - 0
  - 1
  seed: 42
  use_amp: true
  gradient_checkpointing: true
optimize:
  optimizer: AdamW
  lr: 5.0e-05
  weight_decay: 0.001
schedule:
  scheduler: StepLR
  step_size: 300
  gamma: 0.5
log:
  verbose: true
  log: true
  log_dir: /data1/user/lz/wave_movie/testouts/Resshift_PGN
  wandb: false
  wandb_project: OceanSR-Resshift-PGN
beta_schedule:
  train:
    schedule: linear
    n_timestep: 2000
    linear_start: 1e-4
    linear_end: 2e-2
  val:
    schedule: linear
    n_timestep: 2000
    linear_start: 1e-4
    linear_end: 2e-2

model:
  name: MWT2d
  in_channels: 3
  out_channels: 3
  hidden_dim: 128
  k: 6
  n_layers: 6
  c: 1
  alpha: 2
  L: 0
  base: legendre
  act: gelu
  upsample_factor:
  - 4
  - 4
data:
  name: OceanNPY
  data_path: /home/yc/CVPR26/DiffSR/NavierStokes_V1e-5_N1200_T20.mat
  sample_factor: 4
  shape:
  - 200
  - 148
  train_batchsize: 2
  eval_batchsize: 2
  train_ratio: 0.98
  valid_ratio: 0.01
  test_ratio: 0.01
  subset: false
  subset_ratio: 0.1

  normalizer_type: PGN
  dataset_root: /data/Bohai_Sea/process_data
  dyn_vars:
  - Vx
  - Vy
  - Vz
  patch_size: null
  auto_patch: false
  model_divisor: 1
train:
  random_seed: 42
  cuda: true
  device: 0
  epochs: 500
  patience: 10
